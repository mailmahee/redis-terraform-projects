#==============================================================================
# REGION 2: Remote Cluster Credentials Secret (for Region 1)
#==============================================================================
# This secret contains the credentials to access the Region 1 cluster
# Deploy this to Region 2
#==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: redis-enterprise-region1-remote
  namespace: redis-enterprise
type: Opaque
stringData:
  # IMPORTANT: Replace these with your actual Region 1 cluster credentials
  # Get them from Region 1 using:
  # kubectl get secret -n redis-enterprise <rec-name> -o jsonpath='{.data.username}' --context region1 | base64 -d
  # kubectl get secret -n redis-enterprise <rec-name> -o jsonpath='{.data.password}' --context region1 | base64 -d
  
  username: "admin@redis.com"  # Replace with actual username from Region 1
  password: "RedisTest123"     # Replace with actual password from Region 1

