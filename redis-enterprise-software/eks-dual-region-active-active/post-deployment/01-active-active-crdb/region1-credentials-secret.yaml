#==============================================================================
# REGION 1: Remote Cluster Credentials Secret (for Region 2)
#==============================================================================
# This secret contains the credentials to access the Region 2 cluster
# Deploy this to Region 1
#==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: redis-enterprise-region2-remote
  namespace: redis-enterprise
type: Opaque
stringData:
  # IMPORTANT: Replace these with your actual Region 2 cluster credentials
  # Get them from Region 2 using:
  # kubectl get secret -n redis-enterprise <rec-name> -o jsonpath='{.data.username}' --context region2 | base64 -d
  # kubectl get secret -n redis-enterprise <rec-name> -o jsonpath='{.data.password}' --context region2 | base64 -d
  
  username: "admin@redis.com"  # Replace with actual username from Region 2
  password: "RedisTest123"     # Replace with actual password from Region 2

