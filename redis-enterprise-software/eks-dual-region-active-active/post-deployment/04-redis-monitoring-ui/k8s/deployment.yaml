#==============================================================================
# REDIS ENTERPRISE MONITORING UI DEPLOYMENT
#==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
  labels:
    app: redis-monitoring-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-monitoring-ui
  template:
    metadata:
      labels:
        app: redis-monitoring-ui
    spec:
      serviceAccountName: redis-monitoring-ui
      
      initContainers:
        # Install Flask and dependencies
        - name: install-dependencies
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir \
                flask==3.0.0 \
                requests==2.31.0 \
                pyyaml==6.0.1 \
                kubernetes==28.1.0

              # Copy installed packages to shared volume
              cp -r /usr/local/lib/python3.11/site-packages/* /app/packages/
          volumeMounts:
            - name: packages
              mountPath: /app/packages
      
      containers:
        - name: flask-app
          image: python:3.11-slim
          ports:
            - containerPort: 5000
              name: http
          
          env:
            - name: PYTHONPATH
              value: "/app/packages"
            - name: CONFIG_PATH
              value: "/app/config/config.yaml"
          
          command:
            - python
            - /app/app.py
          
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          
          volumeMounts:
            - name: app-code
              mountPath: /app
            - name: config
              mountPath: /app/config
            - name: packages
              mountPath: /app/packages
            - name: region1-secret
              mountPath: /app/secrets/rec-us-east-1
              readOnly: true
            - name: region2-secret
              mountPath: /app/secrets/rec-us-west-2
              readOnly: true
      
      volumes:
        - name: app-code
          configMap:
            name: redis-monitoring-ui-code
        - name: config
          configMap:
            name: redis-monitoring-ui-config
        - name: packages
          emptyDir: {}
        - name: region1-secret
          secret:
            secretName: rec-us-east-1
        - name: region2-secret
          secret:
            secretName: rec-us-west-2