#==============================================================================
# SERVICE ACCOUNT
#==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
  labels:
    app: redis-monitoring-ui

---
#==============================================================================
# ROLE - Access to secrets and pods in redis-enterprise namespace
#==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
rules:
  # Read access to secrets (for API credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rec-us-east-1", "rec-us-west-2"]
    verbs: ["get"]

  # Access to pods for failure simulation
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get", "delete"]

---
#==============================================================================
# CLUSTER ROLE - Access to nodes for failure simulation
#==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: redis-monitoring-ui-nodes
rules:
  # Access to nodes for failure simulation
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]

---
#==============================================================================
# ROLE BINDING
#==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-monitoring-ui
subjects:
  - kind: ServiceAccount
    name: redis-monitoring-ui
    namespace: redis-enterprise

---
#==============================================================================
# CLUSTER ROLE BINDING - For node access
#==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: redis-monitoring-ui-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: redis-monitoring-ui-nodes
subjects:
  - kind: ServiceAccount
    name: redis-monitoring-ui
    namespace: redis-enterprise