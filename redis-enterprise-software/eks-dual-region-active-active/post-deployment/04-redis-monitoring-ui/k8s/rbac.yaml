#==============================================================================
# SERVICE ACCOUNT
#==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
  labels:
    app: redis-monitoring-ui

---
#==============================================================================
# ROLE - Read access to secrets (for API credentials)
#==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rec-us-east-1", "rec-us-west-2"]
    verbs: ["get"]

---
#==============================================================================
# ROLE BINDING
#==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-monitoring-ui
  namespace: redis-enterprise
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-monitoring-ui
subjects:
  - kind: ServiceAccount
    name: redis-monitoring-ui
    namespace: redis-enterprise