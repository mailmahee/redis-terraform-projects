#==============================================================================
# GRAFANA DEPLOYMENT
#==============================================================================
# Grafana for visualizing Prometheus metrics from Redis Enterprise
#==============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      # Local Prometheus (same region)
      - name: Prometheus-Local
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"

      # Remote Prometheus (other region) - CONFIGURE AFTER DEPLOYMENT
      # Uncomment and update the URL after deploying to both regions
      # Option 1: Use LoadBalancer service (recommended for production)
      # - name: Prometheus-Remote
      #   type: prometheus
      #   access: proxy
      #   url: http://<REMOTE-PROMETHEUS-LB-URL>:9090
      #   editable: true
      #   jsonData:
      #     timeInterval: "15s"
      #
      # Option 2: Use VPC Peering + Internal Service
      # - name: Prometheus-Remote
      #   type: prometheus
      #   access: proxy
      #   url: http://prometheus.monitoring.svc.cluster.local:9090
      #   editable: true
      #   jsonData:
      #     timeInterval: "15s"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - name: grafana
              containerPort: 3000
              protocol: TCP
          
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3000"
          
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
          
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      
      volumes:
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: grafana

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  password: "set-via-terraform"  # Placeholder only. Generated manifests use grafana_admin_password.
