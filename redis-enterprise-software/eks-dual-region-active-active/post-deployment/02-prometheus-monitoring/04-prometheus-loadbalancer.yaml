#==============================================================================
# PROMETHEUS LOADBALANCER SERVICE (OPTIONAL)
#==============================================================================
# This creates a LoadBalancer service to expose Prometheus externally
# Use this to allow Grafana in one region to query Prometheus in another region
#
# IMPORTANT SECURITY NOTES:
# 1. This exposes Prometheus to the internet - use with caution!
# 2. For production, consider:
#    - Using internal LoadBalancer (AWS annotation)
#    - Adding authentication (OAuth proxy, AWS ALB with Cognito)
#    - Restricting source IPs via security groups
#    - Using VPC peering instead of public exposure
#==============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-external
  namespace: monitoring
  annotations:
    # Use internal LoadBalancer (recommended for production)
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    
    # Optional: Restrict to specific subnets
    # service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-xxxxx,subnet-yyyyy"
    
    # Optional: Add tags
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "Environment=production,Service=prometheus"
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: external-access
spec:
  type: LoadBalancer
  ports:
    - name: web
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
    prometheus: prometheus

---
#==============================================================================
# ALTERNATIVE: NODEPORT SERVICE (for VPC Peering scenarios)
#==============================================================================
# If you have VPC peering between regions, you can use NodePort instead
# This is more secure as it doesn't create a LoadBalancer
#==============================================================================

