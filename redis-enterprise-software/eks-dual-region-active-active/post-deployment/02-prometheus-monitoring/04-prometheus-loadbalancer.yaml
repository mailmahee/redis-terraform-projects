#     prometheus: prometheus

---
#==============================================================================
# SECURITY GROUP CONFIGURATION NOTES
#==============================================================================
# After creating the LoadBalancer service, you need to configure security groups:
#
# 1. Get the LoadBalancer security group:
#    LB_SG=$(aws elbv2 describe-load-balancers \
#      --query "LoadBalancers[?contains(LoadBalancerName, 'prometheus')].SecurityGroups[0]" \
#      --output text --region <region>)
#
# 2. Allow access from the other region's VPC CIDR or specific IPs:
#    aws ec2 authorize-security-group-ingress \
#      --group-id $LB_SG \
#      --protocol tcp \
#      --port 9090 \
#      --cidr <other-region-vpc-cidr> \
#      --region <region>
#
# 3. Or restrict to specific Grafana pod IPs (more secure but complex)
#
# For internal LoadBalancer:
# - The LoadBalancer will only be accessible within the VPC
# - Use VPC peering to allow cross-region access
# - This is the recommended approach for production
#==============================================================================

