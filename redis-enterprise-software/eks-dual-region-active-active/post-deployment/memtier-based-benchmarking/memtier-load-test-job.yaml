---
#==============================================================================
# MEMTIER BENCHMARK LOAD TEST - ACTIVE-ACTIVE CRDB
#==============================================================================
# Generates ~180K ops/sec load against an Active-Active CRDB service
# - 8 parallel pods (each rate-limited to ~22.5K ops/sec)
# - Each pod gets unique key range (no overlap, perfect distribution)
# - 70% reads / 30% writes
# - 256-byte payload
# - Random pattern (R:R) with pipeline=1
# - 5-minute test duration
#
# Key ranges per pod (2M keys each, 1-indexed):
#   Pod 0: 1 - 2,000,000
#   Pod 1: 2,000,001 - 4,000,000
#   Pod 2: 4,000,001 - 6,000,000
#   Pod 3: 6,000,001 - 8,000,000
#   Pod 4: 8,000,001 - 10,000,000
#   Pod 5: 10,000,001 - 12,000,000
#   Pod 6: 12,000,001 - 14,000,000
#   Pod 7: 14,000,001 - 16,000,000
#
# Usage:
#   kubectl apply -f memtier-load-test-job.yaml --context region1
#   kubectl get pods -l job-name=memtier-load-test -n redis-enterprise -w --context region1
#   kubectl logs -l job-name=memtier-load-test -n redis-enterprise --tail=-1 --context region1 | grep "Totals"
#
# Optional overrides:
#   kubectl set env job/memtier-load-test -n redis-enterprise \
#     CRDB_NAME=my-crdb-service REDIS_PORT=12000 --context region1
#
# Cleanup:
#   kubectl delete job memtier-load-test -n redis-enterprise --context region1
#==============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: memtier-load-test
  namespace: redis-enterprise
  labels:
    app: memtier-benchmark
    test-type: load-generation
    workload: redis-crdb
spec:
  # Run 8 pods in parallel with indexed completion (0-7)
  parallelism: 8
  completions: 8
  completionMode: Indexed
  
  # Keep job history for 1 hour after completion
  ttlSecondsAfterFinished: 3600
  
  # Retry failed pods up to 2 times
  backoffLimit: 2
  
  template:
    metadata:
      labels:
        app: memtier-load-test
        job-name: memtier-load-test
    spec:
      restartPolicy: Never
      
      containers:
      - name: memtier-benchmark
        image: redislabs/memtier_benchmark:latest
        
        # Resource allocation: 4 vCPU, 8GB RAM per pod
        resources:
          requests:
            cpu: "4000m"
            memory: "8Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        
        # Environment variables for Redis connection
        env:
        - name: CRDB_NAME
          value: ""
        - name: REDIS_HOST
          value: ""
        - name: REDIS_PORT
          value: ""
        - name: JOB_COMPLETION_INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
        
        # memtier_benchmark command
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu

          if [ -z "$CRDB_NAME" ]; then
            echo "CRDB_NAME must be set"
            exit 1
          fi

          SERVICE_ENV_PREFIX=$(echo "$CRDB_NAME" | tr '[:lower:]-.' '[:upper:]__')
          HOST_VAR="${SERVICE_ENV_PREFIX}_SERVICE_HOST"
          PORT_VAR="${SERVICE_ENV_PREFIX}_SERVICE_PORT"

          if [ -z "$REDIS_HOST" ]; then
            REDIS_HOST=$(eval "printf '%s' \"\${$HOST_VAR:-}\"")
          fi

          if [ -z "$REDIS_PORT" ]; then
            REDIS_PORT=$(eval "printf '%s' \"\${$PORT_VAR:-}\"")
          fi

          if [ -z "$REDIS_HOST" ]; then
            REDIS_HOST="${CRDB_NAME}.redis-enterprise.svc.cluster.local"
          fi

          if [ -z "$REDIS_PORT" ]; then
            echo "Could not auto-discover Redis port for service $CRDB_NAME."
            echo "Set REDIS_PORT explicitly if the service env var is unavailable."
            exit 1
          fi

          POD_INDEX="${JOB_COMPLETION_INDEX:-0}"
          if ! echo "$POD_INDEX" | grep -qE '^[0-9]+$'; then
            echo "Invalid job completion index: $POD_INDEX"
            exit 1
          fi

          echo "=========================================="
          echo "Starting memtier_benchmark Load Test"
          echo "Completion Index: $POD_INDEX"
          echo "Target: $REDIS_HOST:$REDIS_PORT"
          echo "Database Service: $CRDB_NAME"
          echo "=========================================="
          echo ""

          # Calculate unique key range for this pod
          # Each pod gets 2M keys (1-indexed, memtier doesn't accept key-minimum=0)
          # Indexed jobs expose a stable numeric completion index per pod

          KEYS_PER_POD=2000000
          KEY_MIN=$((POD_INDEX * KEYS_PER_POD + 1))
          KEY_MAX=$(((POD_INDEX + 1) * KEYS_PER_POD))

          echo "Pod Index: $POD_INDEX"
          echo "Key range: $KEY_MIN - $KEY_MAX (2M keys)"
          echo ""

          # Run memtier_benchmark
          # - 50 clients per pod
          # - 4 threads per pod
          # - 256-byte payload
          # - Random pattern (R:R) - uniform distribution across key range
          # - Pipeline=1 (no pipelining for realistic latency)
          # - 5-minute test duration
          # - Unique key range per pod (no overlap)

          memtier_benchmark \
            --server="$REDIS_HOST" \
            --port="$REDIS_PORT" \
            --protocol=redis \
            --clients=50 \
            --threads=4 \
            --ratio=3:7 \
            --data-size=256 \
            --key-pattern=R:R \
            --key-minimum="$KEY_MIN" \
            --key-maximum="$KEY_MAX" \
            --pipeline=1 \
            --test-time=300 \
            --print-percentiles=50,90,95,99,99.9 \
            --run-count=1

          EXIT_CODE=$?
          
          echo ""
          echo "=========================================="
          echo "Test completed with exit code: $EXIT_CODE"
          echo "Completion Index: $POD_INDEX"
          echo "=========================================="
          
          exit $EXIT_CODE
      
      # Tolerate node taints if any
      tolerations:
      - effect: NoSchedule
        operator: Exists
      
      # Spread pods across different nodes for better distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - memtier-load-test
              topologyKey: kubernetes.io/hostname
